];

// 从本地存储加载（如果有）
const localData = localStorage.getItem('adminData');
if (localData) {
  data = JSON.parse(localData);
}

let editIndex = null;

// 渲染列表
function renderList(filteredData = data) {
  let html = '';
  filteredData.forEach((item, i) => {
    html += `
    <div class="card">
      <div class="id">ID：${item.id}</div>
      <div class="title">${item.title}</div>
      <div class="tags">${item.type} | ${item.industry} | ${item.jobType}</div>
      <div class="btns">
        <button onclick="edit(${i})">编辑</button>
        <button onclick="del(${i})" class="danger">删除</button>
      </div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// 搜索：按 ID 定位
function searchById() {
  const searchId = document.getElementById("searchId").value.trim();
  if (!searchId) {
    renderList();
    return;
  }
  const found = data.filter(item => item.id.toString() === searchId);
  if (found.length === 0) {
    alert("未找到该 ID！");
    return;
  }
  renderList(found);
  // 自动填充到表单
  const index = data.findIndex(item => item.id.toString() === searchId);
  edit(index);
}

// 编辑：加载到表单
function edit(i) {
  const item = data[i];
  editIndex = i;
  document.getElementById("id").value = item.id;
  document.getElementById("title").value = item.title;
  document.getElementById("content").value = item.content;
  document.getElementById("type").value = item.type;
  document.getElementById("industry").value = item.industry;
  document.getElementById("jobType").value = item.jobType;
}

// 保存：新建或更新（允许自定义 ID）
function save() {
  const id = document.getElementById("id").value;
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const type = document.getElementById("type").value;
  const industry = document.getElementById("industry").value;
  const jobType = document.getElementById("jobType").value;

  if (!id || !title || !content) {
    alert("ID、标题和内容不能为空！");
    return;
  }

  const newItem = { id, title, content, type, industry, jobType };

  if (editIndex === null) {
    // 新建：直接添加
    data.push(newItem);
  } else {
    // 更新：精准替换对应 ID
    data[editIndex] = newItem;
    editIndex = null;
  }

  localStorage.setItem("adminData", JSON.stringify(data));
  clearForm();
  renderList();
  exportData();
}

// 另存为新版本：自动生成 1234-1、1234-2
function saveAsNewVersion() {
  const oldId = document.getElementById("id").value;
  if (!oldId) {
    alert("请先编辑一条记录，再生成新版本！");
    return;
  }

  // 计算版本号
  let version = 1;
  const baseId = oldId.replace(/-(\d+)$/, (match, num) => {
    version = parseInt(num) + 1;
    return "";
  });
  const newId = `${baseId || oldId}-${version}`;

  // 复制原内容，只改 ID
  const newItem = {
    id: newId,
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    type: document.getElementById("type").value,
    industry: document.getElementById("industry").value,
    jobType: document.getElementById("jobType").value
  };

  data.push(newItem);
  localStorage.setItem("adminData", JSON.stringify(data));
  clearForm();
  renderList();
  exportData();
  alert(`已生成新版本：${newId}`);
}

// 删除
function del(i) {
  if (!confirm("确定删除这条信息？")) return;
  data.splice(i, 1);
  localStorage.setItem("adminData", JSON.stringify(data));
  renderList();
  exportData();
}

// 导出完整 JSON（包含所有数据，直接替换 data.json）
function exportData() {
  const json = JSON.stringify(data, null, 2);
  alert("复制下方所有内容，直接替换到 GitHub 的 data.json 中：\n\n" + json);
  console.log(json);
}

// 清空表单
function clearForm() {
  document.getElementById("id").value = "";
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("searchId").value = "";
  editIndex = null;
  renderList();
}

// 初始加载
function loadData() {
  renderList();
}
</script>
