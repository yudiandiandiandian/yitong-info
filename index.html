<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊通便民信息平台</title>
<style>
    *{box-sizing:border-box;}
    body{margin:0;padding:10px;background:#f5f7fa;font-family:Arial,"微软雅黑",sans-serif;}
    .page{max-width:750px;margin:0 auto;background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
    .header{text-align:center;margin-bottom:15px;}
    .header h1{font-size:20px;color:#d32f2f;margin:0;}
    .tip{background:#fff8e1;color:#f57f17;padding:10px;border-radius:8px;text-align:center;font-size:14px;margin-bottom:15px;line-height:1.5;}

    /* 筛选栏 */
    .filter-bar{margin-bottom:15px;}
    .filter-title{font-size:13px;color:#666;margin-bottom:6px;}
    .filter-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .filter-btns button{padding:6px 12px;border-radius:20px;border:none;background:#e9ecef;color:#333;font-size:14px;cursor:pointer;}
    .filter-btns button.active{background:#0d6efd;color:#fff;}

    /* 卡片 */
    .card{border:1px solid #e9ecef;border-radius:10px;padding:12px;margin-bottom:10px;position:relative;background:#fff;}
    .copy-btn{position:absolute;top:10px;right:10px;background:#0d6efd;color:#fff;border:none;border-radius:6px;padding:3px 6px;font-size:12px;cursor:pointer;}
    .card-no{font-size:12px;color:#999;margin-bottom:4px;}
    .card-title{font-weight:bold;font-size:15px;margin-bottom:6px;}
    .card-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
    .card-tags span{background:#f1f3f5;color:#555;font-size:12px;padding:2px 6px;border-radius:10px;}
    .card-content{font-size:14px;line-height:1.5;color:#333;}

    .footer{text-align:center;font-size:12px;color:#999;margin-top:15px;}
</style>
</head>

<body>
<div class="page">
    <div class="header">
        <h1>伊通本地便民信息平台</h1>
    </div>

    <div class="tip">
        如需商家联系方式<br>请添加微信：__________
    </div>

    <!-- 1 信息大类 -->
    <div class="filter-bar">
        <div class="filter-title">信息大类</div>
        <div class="filter-btns" data-target="type">
            <button class="active" data-val="all">全部</button>
            <button data-val="招聘">招聘</button>
            <button data-val="出租">出租</button>
            <button data-val="出售">出售</button>
            <button data-val="出兑/转让">出兑/转让</button>
            <button data-val="服务/其他">服务/其他</button>
        </div>
    </div>

    <!-- 2 行业类型 -->
    <div class="filter-bar">
        <div class="filter-title">行业类型</div>
        <div class="filter-btns" data-target="industry">
            <button class="active" data-val="all">全部</button>
            <button data-val="餐饮/烧烤/火锅">餐饮/烧烤</button>
            <button data-val="超市/百货/零售">超市/零售</button>
            <button data-val="美容/美甲/养生">美容/养生</button>
            <button data-val="物流/快递/司机">物流/司机</button>
            <button data-val="工厂/技工/普工">工厂/技工</button>
            <button data-val="家政/保洁/护工">家政/护工</button>
            <button data-val="房产/门市/公寓">房产/门市</button>
            <button data-val="其他">其他</button>
        </div>
    </div>

    <!-- 3 用工类型 -->
    <div class="filter-bar">
        <div class="filter-title">用工类型</div>
        <div class="filter-btns" data-target="jobType">
            <button class="active" data-val="all">全部</button>
            <button data-val="全职长期">全职长期</button>
            <button data-val="兼职/小时工">兼职/小时工</button>
            <button data-val="学徒">学徒</button>
            <button data-val="临时工/日结">临时工/日结</button>
        </div>
    </div>

    <!-- 列表 -->
    <div id="list"></div>

    <div class="footer">每日更新 · 真实可靠 · 便民服务</div>
</div>

let filter = { type:"all", industry:"all", jobType:"all" };

function render(){
    let list = data.filter(item => 
        (filter.type === "all" || item.type === filter.type) &&
        (filter.industry === "all" || item.industry === filter.industry) &&
        (filter.jobType === "all" || item.jobType === filter.jobType)
    );
    let html = "";
    list.forEach(item => {
        let txt = `${item.title} ${item.content}`;
        html += `
        <div class="card">
            <button class="copy-btn" onclick="copy('${txt.replace(/'/g, "")}')">复制</button>
            <div class="card-no">编号：${item.id}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-tags">
                <span>${item.type}</span>
                <span>${item.industry}</span>
                <span>${item.jobType}</span>
            </div>
            <div class="card-content">${item.content}</div>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
}

function copy(text){
    navigator.clipboard.writeText(text).then(()=>alert("已复制本条信息"));
}

document.querySelectorAll(".filter-btns").forEach(group => {
    group.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            let target = group.dataset.target;
            let val = btn.dataset.val;
            filter[target] = val;
            group.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            render();
        });
    });
});

render();
</script>
