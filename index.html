// 筛选逻辑
let filter = { type:"all", industry:"all", jobType:"all" };
function render(){
  let list = data.filter(item => 
    (filter.type === "all" || item.type === filter.type) &&
    (filter.industry === "all" || item.industry === filter.industry) &&
    (filter.jobType === "all" || item.jobType === filter.jobType)
  );
  let html = "";
  list.forEach(item => {
    let text = `${item.title} ${item.content}`;
    html += `
    <div class="card">
      <button class="copy-btn" onclick="copy('${text.replace(/'/g,"")}')">复制</button>
      <div class="card-id">编号：${item.id}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-tags">
        <span>${item.type}</span>
        <span>${item.industry}</span>
        <span>${item.jobType}</span>
      </div>
      <div class="card-content">${item.content}</div>
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}

// 复制功能
function copy(text){
  navigator.clipboard.writeText(text).then(()=>alert("已复制本条信息"));
}

// 绑定按钮
document.querySelectorAll(".filter-btns button").forEach(btn => {
  btn.addEventListener("click",()=>{
    let group = btn.parentElement.dataset.target;
    let val = btn.dataset.val;
    filter[group] = val;
    btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

// 初始渲染
