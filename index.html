<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>伊通本地便民信息平台</title>
    <style>
        body{font-family:微软雅黑; margin:0; padding:10px; background:#f5f5f5;}
        .container{max-width:800px; margin:auto; background:white; padding:15px; border-radius:10px;}
        .title{text-align:center; color:#d32f2f; font-size:22px; margin-bottom:10px;}
        .tip{background:#fff3cd; padding:10px; border-radius:5px; text-align:center; margin-bottom:15px; font-size:14px;}
        .item{border-bottom:1px solid #eee; padding:12px 0;}
        .num{color:#0d6efd; font-weight:bold; margin-right:5px;}
        .content{line-height:1.6; margin-top:3px; font-size:15px;}
        .footer{text-align:center; margin-top:20px; font-size:14px; color:#666;}
    </style>
</head>
<body>
    <div class="container">
        <div class="title">伊通本地便民信息平台</div>
        <div class="tip">
            如需联系商家<br>
            请加微信：XXXXXXXXXXX（这里换成你自己的微信号）
        </div>

        <div id="list"></div>

        <div class="footer">每日更新 | 真实可靠 | 便民服务</div>
    </div>

    <script>
        fetch('data.json')
            .then(res=>res.json())
            .then(data=>{
                let html = ''
                data.forEach((item,index)=>{
                    html += `
                    <div class="item">
                        <div><span class="num">${item.id}</span>${item.title}</div>
                        <div class="content">${item.content}</div>
                    </div>
                    `
                })
                document.getElementById('list').innerHTML = html
            })
    </script>
</body>
</html>
